<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Warehouse Scanner</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 30px;
}

input, button, select {
  font-size: 22px;
  padding: 12px;
  margin: 5px;
  width: 80%;
  max-width: 400px;
}

button {
  cursor: pointer;
}

#status {
  font-size: 22px;
  margin-top: 10px;
}

.item {
  border: 1px solid #ccc;
  padding: 10px;
  margin: 5px auto;
  width: 80%;
  max-width: 400px;
}

.delete {
  background: red;
  color: white;
}
</style>

</head>

<body>

<div id="app"></div>

<script>

// ===== БАЗА =====
const users = {
  "admin": "1234"
};

const cdcData = {
  "Berlin": [1,2,3,4,5,6,8],
  "Hamburg": [10,11,12]
};

// ===== ПЕРЕМЕННЫЕ =====
let currentUser = null;
let currentCDC = null;
let tirNumber = "";
let scanned = [];

// ===== LOGIN =====
function showLogin() {
  document.getElementById("app").innerHTML = `
    <h2>Login</h2>
    <input id="login" placeholder="login">
    <input id="pass" type="password" placeholder="password">
    <button onclick="login()">Enter</button>
    <p id="msg"></p>
  `;
}

function login() {
  const l = document.getElementById("login").value.trim();
  const p = document.getElementById("pass").value.trim();

  if (users[l] === p) {
    currentUser = l;
    showTIR();
  } else {
    document.getElementById("msg").innerText = "❌ Wrong login";
  }
}

// ===== TIR =====
function showTIR() {
  document.getElementById("app").innerHTML = `
    <h2>TIR Number</h2>
    <input id="tir" value="${tirNumber}">
    <button onclick="goCDC()">Next</button>
  `;
}

function goCDC() {
  const tirInput = document.getElementById("tir").value.trim();

  if (!tirInput) {
    alert("Enter TIR");
    return;
  }

  tirNumber = tirInput;
  showCDC();
}

// ===== CDC =====
function showCDC() {
  let options = Object.keys(cdcData)
    .map(c => `<option>${c}</option>`)
    .join("");

  document.getElementById("app").innerHTML = `
    <h2>Select CDC</h2>
    <select id="cdc">${options}</select>
    <button onclick="startScan()">Start</button>
  `;
}

function startScan() {
  currentCDC = document.getElementById("cdc").value;
  showScanner();
}

// ===== SCAN =====
function showScanner() {
  document.getElementById("app").innerHTML = `
    <h2>CDC: ${currentCDC}</h2>
    <p>TIR: ${tirNumber} <button onclick="showTIR()">✏️ Edit</button></p>

    <input id="scan" placeholder="scan..." autofocus>
    <p id="status"></p>

    <div id="list"></div>

    <button onclick="save()">SAVE</button>
    <button onclick="sendEmail()">SEND</button>
  `;

  document.getElementById("scan").addEventListener("change", handleScan);
}

// ===== SCAN LOGIC =====
function handleScan(e) {
  const code = e.target.value.trim();
  e.target.value = "";

  const status = document.getElementById("status");

  if (!code) return;

  const store = parseInt(code.slice(-1));

  // ❌ НЕ В CDC
  if (!cdcData[currentCDC].includes(store)) {
    status.innerText = "❌ ERROR: Store not in " + currentCDC;
    return;
  }

  // ⚠️ ДУБЛИКАТ
  if (scanned.find(x => x.store === store)) {
    const confirmDuplicate = confirm("⚠️ Already scanned. Continue?");
    if (!confirmDuplicate) return;
  }

  chooseType(store);
}

// ===== TYPE (ОБНОВЛЕНО) =====
function chooseType(store) {
  const input = prompt("1-8L  2-8S  3-4L  4-20S  5-Box  6-Euro  7-Other");

  if (!input) return;

  let type = "";

  switch(input) {
    case "1":
      type = "8 LARGE TOTES";
      break;
    case "2":
      type = "8 SMALL TOTES";
      break;
    case "3":
      type = "4 LARGE TOTES";
      break;
    case "4":
      type = "20 SMALL TOTES";
      break;
    case "5":
      type = "BLACK BOX";
      break;
    case "6":
      type = "EURO PALLET";
      break;
    case "7":
      type = prompt("Enter OTHER:");
      if (!type) return;
      break;
    default:
      alert("Invalid choice");
      return;
  }

  scanned.push({ store, type });

  updateStatus();
  renderList();
}

// ===== STATUS =====
function updateStatus() {
  const status = document.getElementById("status");

  if (scanned.length === 0) {
    status.innerText = "";
  } else {
    status.innerText = "📝 Total scanned: " + scanned.length;
  }
}

// ===== LIST =====
function renderList() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  scanned.forEach((item, index) => {
    list.innerHTML += `
      <div class="item">
        Store ${item.store} → ${item.type}
        <br>
        <button class="delete" onclick="removeItem(${index})">Delete</button>
      </div>
    `;
  });
}

function removeItem(index) {
  scanned.splice(index, 1);
  renderList();
  updateStatus();
}

// ===== SAVE =====
function generateReport() {
  let text = "TIR: " + tirNumber + "\n";
  text += "CDC: " + currentCDC + "\n\n";

  scanned.forEach(s => {
    text += `Store ${s.store} → ${s.type}\n`;
  });

  return text;
}

function save() {
  if (scanned.length === 0) {
    alert("Nothing scanned");
    return;
  }

  alert(generateReport());
}

// ===== SEND =====
function sendEmail() {
  if (scanned.length === 0) {
    alert("Nothing to send");
    return;
  }

  const subject = "TIR " + tirNumber;
  const body = encodeURIComponent(generateReport());

  window.location.href =
    `mailto:test@email.com?subject=${subject}&body=${body}`;
}

// ===== START =====
showLogin();

</script>

</body>
</html>
