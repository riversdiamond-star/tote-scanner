<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Warehouse Scanner</title>

<style>
body { font-family: Arial; margin:0; padding:15px; background:#f4f4f4;}
#app { max-width:500px; margin:0 auto;}

input, select {
  font-size:16px;
  padding:14px;
  margin:6px 0;
  width:100%;
  box-sizing:border-box;
}

button {
  font-size:16px;
  padding:12px;
  margin:6px 0;
  width:100%;
  border:none;
  background:#222;
  color:white;
  border-radius:6px;
}

.type-btn { background:#e0e0e0; color:black; }

.success { color:green; font-weight:bold; }
.error { color:red; font-weight:bold; }

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#e6ffe6;
  padding:12px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #8bc34a;
}

.item-text { color:#000; font-weight:500; }

.delete {
  background:red;
  color:white;
  width:auto;
  padding:6px 10px;
  font-size:12px;
  border-radius:5px;
}

.label { font-size:13px; color:#666; }

.duplicate-box {
  background:#fff3cd;
  padding:10px;
  border-radius:6px;
  margin:10px 0;
  border:1px solid #ffc107;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

// ===== TIME =====
let timeInterval = null;

function startClock(){
  if(timeInterval) clearInterval(timeInterval);
  updateDateTime();
  timeInterval = setInterval(updateDateTime, 1000);
}

function updateDateTime(){
  const now = new Date();
  const el = document.getElementById("datetime");
  if(el){
    el.innerText = `📅 ${now.toLocaleDateString()} | 🕒 ${now.toLocaleTimeString()}`;
  }
}

// ===== DATA =====
const users = { "admin": "1234" };

const cdcData = {
  "Berlin": [1,2,3,4,5,6,8],
  "Hamburg": [10,11,12]
};

let currentCDC=null;
let tirNumber="";
let scanned=[];
let pendingStore=null;

// ===== STORAGE =====
function saveState(){
  localStorage.setItem("scannerData", JSON.stringify({
    currentCDC,
    tirNumber,
    scanned
  }));
}

function loadState(){
  const data = localStorage.getItem("scannerData");
  if(!data) return false;

  const parsed = JSON.parse(data);
  currentCDC = parsed.currentCDC;
  tirNumber = parsed.tirNumber;
  scanned = parsed.scanned || [];
  return true;
}

function resetApp(){
  localStorage.removeItem("scannerData");
  currentCDC=null;
  tirNumber="";
  scanned=[];
  pendingStore=null;
  showLogin();
}

// ===== CHANGE CDC =====
function changeCDC(){
  if(scanned.length > 0){
    alert("Cannot change CDC while list is not empty");
    return;
  }

  const options = Object.keys(cdcData).join("\n");
  const newCDC = prompt("Enter CDC:\n" + options, currentCDC);

  if(!newCDC) return;

  if(!cdcData[newCDC]){
    alert("Wrong CDC");
    return;
  }

  currentCDC = newCDC;
  saveState();
  showScanner();
}

// ===== LOGIN =====
function showLogin(){
  document.getElementById("app").innerHTML=`
    <h2>Login</h2>
    <input id="login">
    <input id="pass" type="password">
    <button onclick="login()">Enter</button>
    <p id="msg"></p>
  `;
}

function login(){
  const l=document.getElementById("login").value.trim();
  const p=document.getElementById("pass").value.trim();

  if(users[l]===p){
    showTIR();
  } else {
    document.getElementById("msg").innerText="❌ Wrong login";
  }
}

// ===== TIR =====
function showTIR(){
  document.getElementById("app").innerHTML=`
    <h2>TIR Number</h2>
    <input id="tir">
    <button onclick="goCDC()">Next</button>
  `;
}

function goCDC(){
  const val=document.getElementById("tir").value.trim();
  if(!val) return alert("Enter TIR");
  tirNumber=val;
  showCDC();
}

// ===== CDC =====
function showCDC(){
  document.getElementById("app").innerHTML=`
    <h2>Select CDC</h2>
    <select id="cdc">
      ${Object.keys(cdcData).map(c=>`<option>${c}</option>`).join("")}
    </select>
    <button onclick="startScan()">Start</button>
  `;
}

function startScan(){
  currentCDC=document.getElementById("cdc").value;
  saveState();
  showScanner();
}

// ===== SCANNER =====
function showScanner(){
  document.getElementById("app").innerHTML=`
    <h3>
      ${currentCDC}
      <button onclick="changeCDC()" style="width:auto;padding:6px 10px;font-size:12px;margin-left:10px;">
        Change
      </button>
    </h3>

    <div id="datetime" class="label"></div>

    <div class="label">TIR</div>
    <input id="tirLive" value="${tirNumber}">

    <div class="label">Scan barcode</div>
    <input id="scan" autofocus>

    <p id="status"></p>

    <div id="duplicate"></div>
    <div id="types"></div>
    <div id="list"></div>

    <button onclick="save()">SAVE</button>
    <button onclick="sendEmail()">SEND</button>
    <button onclick="newLoad()">NEW LOAD</button>
    <button onclick="logout()">LOGOUT</button>
  `;

  document.getElementById("scan").addEventListener("change", handleScan);
  document.getElementById("tirLive").addEventListener("input", e=>{
    tirNumber=e.target.value;
    saveState();
  });

  renderList();
  updateStatus();
  startClock();
}

// ===== SCAN =====
function handleScan(e){
  const code=e.target.value.trim();
  e.target.value="";

  if(!code) return;

  const store=parseInt(code.slice(-1));
  const status=document.getElementById("status");

  if(!cdcData[currentCDC].includes(store)){
    status.className="error";
    status.innerText="❌ Wrong store";
    return;
  }

  if(scanned.find(x=>x.store===store)){
    document.getElementById("duplicate").innerHTML=`
      <div class="duplicate-box">
        ⚠️ Store ${store} already scanned<br>
        <button onclick="forceAdd(${store})">Continue</button>
      </div>
    `;
    return;
  }

  pendingStore=store;
  showTypes();
}

// ===== TYPES =====
function showTypes(){
  document.getElementById("types").innerHTML=`
    <button class="type-btn" onclick="addType('8 LARGE TOTES')">8 LARGE</button>
    <button class="type-btn" onclick="addType('8 SMALL TOTES')">8 SMALL</button>
    <button class="type-btn" onclick="addType('4 LARGE TOTES')">4 LARGE</button>
    <button class="type-btn" onclick="addType('20 SMALL TOTES')">20 SMALL</button>
    <button class="type-btn" onclick="addType('BLACK BOX')">BLACK BOX</button>
    <button class="type-btn" onclick="addType('EURO PALLET')">EURO PALLET</button>
    <button class="type-btn" onclick="addOther()">OTHER</button>
  `;
}

// ===== ADD =====
function addType(type){
  scanned.push({store:pendingStore,type});
  pendingStore=null;

  document.getElementById("duplicate").innerHTML="";
  document.getElementById("types").innerHTML="";

  renderList();
  updateStatus();
  saveState();
}

function addOther(){
  const val=prompt("Enter OTHER:");
  if(!val) return;
  addType(val);
}

function forceAdd(store){
  document.getElementById("duplicate").innerHTML="";
  pendingStore=store;
  showTypes();
}

// ===== LIST =====
function renderList(){
  const list=document.getElementById("list");
  list.innerHTML="";

  scanned.forEach((item,i)=>{
    list.innerHTML+=`
      <div class="item">
        <div class="item-text">
          Store ${item.store}<br>${item.type}
        </div>
        <button class="delete" onclick="removeItem(${i})">X</button>
      </div>
    `;
  });
}

function removeItem(i){
  scanned.splice(i,1);
  renderList();
  updateStatus();
  saveState();
}

// ===== STATUS =====
function updateStatus(){
  const status=document.getElementById("status");

  if(scanned.length===0){
    status.innerText="";
  } else {
    status.innerText="📝 Total: "+scanned.length;
  }
}

// ===== REPORT =====
function generateReport(){
  let text = "TIR: " + tirNumber + "\n";
  text += "CDC: " + currentCDC + "\n\n";

  scanned.forEach(s=>{
    text += `Store ${s.store} → ${s.type}\n`;
  });

  return text;
}

function save(){
  if(!scanned.length) return alert("Nothing scanned");
  alert(generateReport());
}

// ===== ACTIONS =====
function newLoad(){
  scanned=[];
  tirNumber="";
  currentCDC=null;
  saveState();
  showCDC();
}

function logout(){
  resetApp();
}

// ===== SEND (UPDATED) =====
function sendEmail(){
  if(!scanned.length) return alert("Nothing to send");

  const report = generateReport();

  window.location.href =
    `mailto:test@email.com?subject=TIR ${tirNumber}&body=${encodeURIComponent(report)}`;

  setTimeout(()=>{
    resetApp(); // 🔥 теперь возвращает на логин
  },800);
}

// START
if(loadState()){
  showScanner();
} else {
  showLogin();
}

</script>
</body>
</html>
