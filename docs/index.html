<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Warehouse Scanner</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
  padding-top: 20px;
}

#app {
  max-width: 500px;
  margin: 0 auto;
}

input, button, select {
  font-size: 16px;
  padding: 14px;
  margin: 6px;
  width: 90%;
  max-width: 400px;
}

button {
  cursor: pointer;
}

.type-btn {
  background: #eee;
}

.delete {
  background: red;
  color: white;
  width: auto;        /* 🔥 убираем растягивание */
  padding: 6px 12px;  /* делаем компактной */
  font-size: 14px;    /* меньше текста */
}

#status {
  font-size: 18px;
  margin-top: 10px;
}

.item {
  border: 1px solid #ccc;
  padding: 12px;
  margin: 6px auto;
  width: 90%;
  max-width: 400px;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

// ===== БАЗА =====
const users = {
  "admin": "1234"
};

const cdcData = {
  "Berlin": [1,2,3,4,5,6,8],
  "Hamburg": [10,11,12]
};

// ===== ПЕРЕМЕННЫЕ =====
let currentUser = null;
let currentCDC = null;
let tirNumber = "";
let scanned = [];
let pendingStore = null;

// ===== LOGIN =====
function showLogin() {
  app.innerHTML = `
    <h2>Login</h2>
    <input id="login">
    <input id="pass" type="password">
    <button onclick="login()">Enter</button>
    <p id="msg"></p>
  `;
}

function login() {
  const l = document.getElementById("login").value.trim();
  const p = document.getElementById("pass").value.trim();

  if (users[l] === p) {
    currentUser = l;
    showTIR();
  } else {
    msg.innerText = "❌ Wrong login";
  }
}

// ===== TIR =====
function showTIR() {
  app.innerHTML = `
    <h2>TIR</h2>
    <input id="tir" value="${tirNumber}">
    <button onclick="goCDC()">Next</button>
  `;
}

function goCDC() {
  const val = tir.value.trim();
  if (!val) return alert("Enter TIR");

  tirNumber = val;
  showCDC();
}

// ===== CDC =====
function showCDC() {
  let options = Object.keys(cdcData)
    .map(c => `<option>${c}</option>`)
    .join("");

  app.innerHTML = `
    <h2>CDC</h2>
    <select id="cdc">${options}</select>
    <button onclick="startScan()">Start</button>
  `;
}

function startScan() {
  currentCDC = cdc.value;
  showScanner();
}

// ===== SCANNER =====
function showScanner() {
  app.innerHTML = `
    <h3>${currentCDC}</h3>
    <p>TIR: ${tirNumber} <button onclick="showTIR()">Edit</button></p>

    <input id="scan" placeholder="scan..." autofocus>
    <p id="status"></p>

    <div id="types"></div>
    <div id="list"></div>

    <button onclick="save()">SAVE</button>
    <button onclick="sendEmail()">SEND</button>
  `;

  document.getElementById("scan").addEventListener("change", handleScan);
}

// ===== SCAN =====
function handleScan(e) {
  const code = e.target.value.trim();
  e.target.value = "";

  const status = document.getElementById("status");

  if (!code) return;

  const store = parseInt(code.slice(-1));

  if (!cdcData[currentCDC].includes(store)) {
    status.innerText = "❌ Wrong store";
    return;
  }

  if (scanned.find(x => x.store === store)) {
    if (!confirm("Duplicate. Continue?")) return;
  }

  pendingStore = store;
  showTypeButtons();
}

// ===== TYPE BUTTONS =====
function showTypeButtons() {
  document.getElementById("types").innerHTML = `
    <button class="type-btn" onclick="addType('8 LARGE TOTES')">8 LARGE</button>
    <button class="type-btn" onclick="addType('8 SMALL TOTES')">8 SMALL</button>
    <button class="type-btn" onclick="addType('4 LARGE TOTES')">4 LARGE</button>
    <button class="type-btn" onclick="addType('20 SMALL TOTES')">20 SMALL</button>
    <button class="type-btn" onclick="addType('BLACK BOX')">BLACK BOX</button>
    <button class="type-btn" onclick="addType('EURO PALLET')">EURO PALLET</button>
    <button class="type-btn" onclick="addOther()">OTHER</button>
  `;
}

// ===== ADD TYPE =====
function addType(type) {
  scanned.push({ store: pendingStore, type });
  pendingStore = null;

  document.getElementById("types").innerHTML = "";
  updateStatus();
  renderList();
}

// ===== OTHER =====
function addOther() {
  const val = prompt("Enter OTHER:");
  if (!val) return;

  scanned.push({ store: pendingStore, type: val });
  pendingStore = null;

  document.getElementById("types").innerHTML = "";
  updateStatus();
  renderList();
}

// ===== STATUS =====
function updateStatus() {
  status.innerText = scanned.length
    ? "📝 Total: " + scanned.length
    : "";
}

// ===== LIST =====
function renderList() {
  list.innerHTML = "";

  scanned.forEach((item, i) => {
    list.innerHTML += `
      <div class="item">
        Store ${item.store} → ${item.type}
        <br>
        <button class="delete" onclick="removeItem(${i})">Delete</button>
      </div>
    `;
  });
}

function removeItem(i) {
  scanned.splice(i, 1);
  renderList();
  updateStatus();
}

// ===== SAVE =====
function generateReport() {
  let text = "TIR: " + tirNumber + "\nCDC: " + currentCDC + "\n\n";

  scanned.forEach(s => {
    text += `Store ${s.store} → ${s.type}\n`;
  });

  return text;
}

function save() {
  if (!scanned.length) return alert("Nothing scanned");
  alert(generateReport());
}

// ===== SEND =====
function sendEmail() {
  if (!scanned.length) return alert("Nothing to send");

  window.location.href =
    `mailto:test@email.com?subject=TIR ${tirNumber}&body=${encodeURIComponent(generateReport())}`;
}

// ===== START =====
showLogin();

</script>
</body>
</html>
