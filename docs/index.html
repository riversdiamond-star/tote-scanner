<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Warehouse Scanner</title>

<style>
body { font-family: Arial; margin:0; padding:15px; background:#f4f4f4;}
#app { max-width:500px; margin:0 auto;}

input, select {
  font-size:16px;
  padding:14px;
  margin:6px 0;
  width:100%;
  box-sizing:border-box;
}

button {
  font-size:16px;
  padding:12px;
  margin:6px 0;
  width:100%;
  border:none;
  background:#222;
  color:white;
  border-radius:6px;
}

.type-btn { background:#e0e0e0; color:black; }

.success { color:green; font-weight:bold; }
.error { color:red; font-weight:bold; }

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#e6ffe6;
  padding:12px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #8bc34a;
}

.item-text { color:#000; font-weight:500; }

.delete {
  background:red;
  color:white;
  width:auto;
  padding:6px 10px;
  font-size:12px;
  border-radius:5px;
}

.label { font-size:13px; color:#666; }

.duplicate-box {
  background:#fff3cd;
  padding:10px;
  border-radius:6px;
  margin:10px 0;
  border:1px solid #ffc107;
}

/* 🔥 FIXED HEADER */
.fixed-header{
  position:sticky;
  top:0;
  background:#fff;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ddd;
  z-index:10;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

// ===== TIME =====
let timeInterval = null;

function startClock(){
  if(timeInterval) clearInterval(timeInterval);
  updateDateTime();
  timeInterval = setInterval(updateDateTime, 1000);
}

function updateDateTime(){
  const now = new Date();
  const el = document.getElementById("datetime");
  if(el){
    el.innerText = `📅 ${now.toLocaleDateString()} | 🕒 ${now.toLocaleTimeString()}`;
  }
}

// ===== DATA =====
const users = { "admin": "1234" };

const cdcData = {

  "Berlin": [
    25,29,36,467,468,472,483,488,508,515,516,518,535,538,559,
    565,579,581,582,589,710,738,870,872
  ],

  "Hamburg": [
    26,34,38,451,452,453,454,455,456,459,460,475,477,490,520,
    525,529,540,541,555,563,567,572,865,866
  ],

  "Darmstadt": [
    28,32,35,37,469,470,474,478,484,494,496,507,510,523,532,
    537,564,569,570,585,587,591,597,862
  ],

  "Herne": [
    42,457,458,461,462,463,471,476,481,491,504,506,514,524,527,
    528,551,554,558,568,575,584,593,595,596,871,874,876,9042
  ],

  "Zoerbig": [
    27,464,466,473,480,489,509,545,547,550,858,859,861
  ],

  "Bielefeld": [
    23,465,482,493,498,513,522,544,553,560,571,578,594,599,857
  ],

  "Wroclaw": [
    43,44,46,47,48,49,701,702,703,704,705,708,711,714,715,
    720,725,727,730,732,734,735,741,742,890,892,896,9049
  ],

  "Torun": [
    712,716,719,723,726,728,731,740,895
  ],

  "Teresin": [
    706,707,709,721,722,729,733,736,737,739,743,744,889
  ],

  "Kirchheim": [
    31,33,39,41,479,486,492,495,503,519,577,583,853,854,855,
    863,869,885
  ],

  "West": [
    485,487,499,501,502,505,521,526,530,533,534,536,549,566,580,
    590,856,860,884,1001,1003,9003
  ],

  "Vienna": [
    54,56,769,770,771,772,773,774,775,776,777,778,779,781,831,832,898,899
  ],

  "Duiven": [
    679,680,681,682,683,684,685,686,
    821,822,823,824,825,826,827,
    828,829,830,879
  ],

  "Nuernberg": [
    497,531,546,556,557,561,562,573,586,588,598,875,881,882,883
  ],

  "Krakow": [
    51,713,717,718,724,891,893,894,897,9051
  ],

  "AT SUED": [
    768,780,782,783,784
  ]

};

let currentCDC=null;
let tirNumber="";
let scanned=[];
let pendingStore=null;

// ===== STORAGE =====
function saveState(){
  localStorage.setItem("scannerData", JSON.stringify({
    currentCDC,
    tirNumber,
    scanned
  }));
}

function loadState(){
  const data = localStorage.getItem("scannerData");
  if(!data) return false;

  const parsed = JSON.parse(data);
  currentCDC = parsed.currentCDC;
  tirNumber = parsed.tirNumber;
  scanned = parsed.scanned || [];
  return true;
}

function resetApp(){
  localStorage.removeItem("scannerData");
  currentCDC=null;
  tirNumber="";
  scanned=[];
  pendingStore=null;
  showLogin();
}

// ===== CHANGE CDC =====
function changeCDC(){
  if(scanned.length > 0){
    alert("Cannot change CDC while list is not empty");
    return;
  }

  const options = Object.keys(cdcData).join("\n");
  const newCDC = prompt("Enter CDC:\n" + options, currentCDC);

  if(!newCDC) return;

  if(!cdcData[newCDC]){
    alert("Wrong CDC");
    return;
  }

  currentCDC = newCDC;
  saveState();
  showScanner();
}

// ===== LOGIN =====
function showLogin(){
  document.getElementById("app").innerHTML=`
    <h2>Login</h2>
    <input id="login">
    <input id="pass" type="password">
    <button onclick="login()">Enter</button>
    <p id="msg"></p>
  `;
}

function login(){
  const l=document.getElementById("login").value.trim();
  const p=document.getElementById("pass").value.trim();

  if(users[l]===p){
    showTIR();
  } else {
    document.getElementById("msg").innerText="❌ Wrong login";
  }
}

// ===== TIR =====
function showTIR(){
  document.getElementById("app").innerHTML=`
    <h2>TIR Number</h2>
    <input id="tir">
    <button onclick="goCDC()">Next</button>
  `;
}

function goCDC(){
  const val=document.getElementById("tir").value.trim();
  if(!val) return alert("Enter TIR");
  tirNumber=val;
  showCDC();
}

// ===== CDC =====
function showCDC(){
  document.getElementById("app").innerHTML=`
    <h2>Select CDC</h2>
    <select id="cdc">
      ${Object.keys(cdcData).map(c=>`<option>${c}</option>`).join("")}
    </select>
    <button onclick="startScan()">Start</button>
  `;
}

function startScan(){
  currentCDC=document.getElementById("cdc").value;
  saveState();
  showScanner();
}

// ===== SCANNER =====
function showScanner(){
  document.getElementById("app").innerHTML=`

    <div class="fixed-header">
      <b>CDC:</b> ${currentCDC} |
      <b>TIR:</b> ${tirNumber}
      <div id="datetime" class="label"></div>
    </div>

    <h3>
      ${currentCDC}
      <button onclick="changeCDC()" style="width:auto;padding:6px 10px;font-size:12px;margin-left:10px;">
        Change
      </button>
    </h3>

    <div class="label">TIR</div>
    <input id="tirLive" value="${tirNumber}">

    <div class="label">Scan barcode</div>
    <input id="scan" autofocus>

    <p id="status"></p>

    <div id="duplicate"></div>
    <div id="types"></div>
    <div id="list"></div>

    <button onclick="save()">SAVE</button>
    <button onclick="sendEmail()">SEND</button>
    <button onclick="newLoad()">NEW LOAD</button>
    <button onclick="logout()">LOGOUT</button>
  `;

  document.getElementById("scan").addEventListener("change", handleScan);
  document.getElementById("tirLive").addEventListener("input", e=>{
    tirNumber=e.target.value;
    saveState();
  });

  renderList();
  updateStatus();
  startClock();
}

// ===== SCAN =====
function handleScan(e){
  const code=e.target.value.trim();
  e.target.value="";

  if(!code) return;

  const store = parseInt(code);
  const status=document.getElementById("status");

  if(!cdcData[currentCDC].includes(store)){
    status.className="error";
    status.innerText="❌ Wrong store";
    return;
  }

  if(scanned.find(x=>x.store===store)){
    document.getElementById("duplicate").innerHTML=`
      <div class="duplicate-box">
        ⚠️ Store ${store} already scanned<br>
        <button onclick="forceAdd(${store})">Continue</button>
      </div>
    `;
    return;
  }

  pendingStore=store;
  showTypes();
}

// ===== TYPES =====
function showTypes(){
  document.getElementById("types").innerHTML=`
    <button class="type-btn" onclick="addType('8 LARGE TOTES')">8 LARGE</button>
    <button class="type-btn" onclick="addType('8 SMALL TOTES')">8 SMALL</button>
    <button class="type-btn" onclick="addType('4 LARGE TOTES')">4 LARGE</button>
    <button class="type-btn" onclick="addType('20 SMALL TOTES')">20 SMALL</button>
    <button class="type-btn" onclick="addType('BLACK BOX')">BLACK BOX</button>
    <button class="type-btn" onclick="addType('EURO PALLET')">EURO PALLET</button>
    <button class="type-btn" onclick="addOther()">OTHER</button>
  `;
}

// ===== ADD =====
function addType(type){
  scanned.push({store:pendingStore,type});
  pendingStore=null;

  document.getElementById("duplicate").innerHTML="";
  document.getElementById("types").innerHTML="";

  renderList();
  updateStatus();
  saveState();
}

function addOther(){
  const val=prompt("Enter OTHER:");
  if(!val) return;
  addType(val);
}

function forceAdd(store){
  document.getElementById("duplicate").innerHTML="";
  pendingStore=store;
  showTypes();
}

// ===== LIST =====
function renderList(){
  const list=document.getElementById("list");
  list.innerHTML="";

  scanned.forEach((item,i)=>{
    list.innerHTML+=`
      <div class="item">
        <div class="item-text">
          Store ${item.store}<br>${item.type}
        </div>
        <button class="delete" onclick="removeItem(${i})">X</button>
      </div>
    `;
  });
}

function removeItem(i){
  scanned.splice(i,1);
  renderList();
  updateStatus();
  saveState();
}

// ===== STATUS =====
function updateStatus(){
  const status=document.getElementById("status");

  if(scanned.length===0){
    status.innerText="";
  } else {
    status.innerText="📝 Total: "+scanned.length;
  }
}

// ===== REPORT =====
function generateReport(){
  let text = "TIR: " + tirNumber + "\n";
  text += "CDC: " + currentCDC + "\n\n";

  scanned.forEach(s=>{
    text += `Store ${s.store} → ${s.type}\n`;
  });

  return text;
}

function save(){
  if(!scanned.length) return alert("Nothing scanned");
  alert(generateReport());
}

// ===== ACTIONS =====
function newLoad(){
  scanned=[];
  tirNumber="";
  currentCDC=null;
  saveState();
  showCDC();
}

function logout(){
  resetApp();
}

// ===== SEND (CONFIRM) =====
function sendEmail(){
  if(!scanned.length) return alert("Nothing to send");

  const confirmSend = confirm("Send report?");
  if(!confirmSend) return;

  const report = generateReport();

  window.location.href =
    `mailto:test@email.com?subject=TIR ${tirNumber}&body=${encodeURIComponent(report)}`;

  setTimeout(()=>{
    resetApp();
  },800);
}

// START
if(loadState()){
  showScanner();
} else {
  showLogin();
}

</script>
</body>
</html>
